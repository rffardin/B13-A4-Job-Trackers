<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div id="app" class="max-w-6xl mx-auto">
        </div>


        <header class="mb-8">
    <h1 class="text-3xl font-bold text-slate-800 mb-6">Job Application Tracker</h1>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
            <p class="text-gray-500 font-medium">Total</p>
            <h2 id="total-count" class="text-4xl font-bold text-blue-900">8</h2>
        </div>
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
            <p class="text-gray-500 font-medium">Interview</p>
            <h2 id="interview-count" class="text-4xl font-bold text-green-600">0</h2>
        </div>
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
            <p class="text-gray-500 font-medium">Rejected</p>
            <h2 id="rejected-count" class="text-4xl font-bold text-red-500">0</h2>
        </div>
    </div>
</header>


<section>
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-blue-900">Available Jobs</h2>
        <p class="text-gray-500"><span id="section-job-count">8</span> jobs</p>
    </div>
      <div class="flex gap-2 mb-6">
        <button onclick="filterJobs('all')" id="tab-all" class="btn btn-sm btn-primary">All</button>
        <button onclick="filterJobs('interview')" id="tab-interview" class="btn btn-sm bg-white border-gray-200">Interview</button>
        <button onclick="filterJobs('rejected')" id="tab-rejected" class="btn btn-sm bg-white border-gray-200">Rejected</button>
    </div>
        <div id="job-container" class="grid gap-6">
        </div>
          </section>


          
    <script src="script.js"></script>
</body>
</html>
